name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check worker/ tests/
      - run: ruff format --check worker/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv pip install --system -r pyproject.toml
      - run: uv pip install --system pytest pytest-asyncio pytest-cov respx
      - run: pytest tests/ -k "not sql_parity" --cov=worker --cov-report=term-missing -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t threecx-call-worker:ci .

  push-ghcr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/clemensblock/threecx-call-worker:${{ github.sha }}
            ghcr.io/clemensblock/threecx-call-worker:latest
