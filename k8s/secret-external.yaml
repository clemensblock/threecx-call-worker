apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: threecx-worker-secrets
  namespace: threecx-worker
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: tinana-k3s-tl6-f
        envSlug: prod
        secretsPath: /threecx-worker
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: infisical
  managedSecretReference:
    secretName: threecx-worker-secrets
    secretNamespace: threecx-worker
    secretType: Opaque
